name: Build & Push Frontend Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        run: echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u Enigma-52 --password-stdin

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/enigma-52/workway-frontend:latest
          build-args: |
            BACKEND_API_URL=https://www.workway.dev
            NEXT_PUBLIC_SITE_URL=https://www.workway.dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
