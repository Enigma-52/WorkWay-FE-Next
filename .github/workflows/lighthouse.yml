name: Lighthouse CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - group: 1
            urls: >-
              http://localhost:3000/
              http://localhost:3000/jobs
              http://localhost:3000/skills
              http://localhost:3000/companies
              http://localhost:3000/domains
          - group: 2
            urls: >-
              http://localhost:3000/salary-insights
              http://localhost:3000/company/openai
              http://localhost:3000/job/sentinelone-software-engineer-7785500003
              http://localhost:3000/domain/ai
              http://localhost:3000/skill/agile

    env:
      BACKEND_API_URL: https://www.workway.dev
      NEXT_PUBLIC_SITE_URL: https://www.workway.dev
      PORT: 3000

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI (group ${{ matrix.group }})
        run: |
          ARGS=""
          for u in ${{ matrix.urls }}; do
            ARGS="$ARGS --collect.url=$u"
          done
          npx @lhci/cli@0.15.x autorun $ARGS
